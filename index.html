  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"f8d5f3c1-2bc7-4ff4-9e76-3ece3f52b445\"><\/script>\n<\/head>\n<body>\n\n<x-dc>\n<helmet>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n<link rel=\"stylesheet\" href=\"https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap\">\n<style>\n  *, *::before, *::after { box-sizing: border-box; }\n  :root{\n    --orange:#FF5000; --orange-d:#FF4000; --orange-w:#FF711F;\n    --blue:#27418B; --blue-d:#1F2F5C; --blue-l:#4165CB;\n    --ink:#1D1D1F; --muted:#6E6E73; --surface:#F5F5F7; --surface-2:#FBFBFD; --line:rgba(0,0,0,0.10);\n    --grad-orange:linear-gradient(135deg,#FF4000,#FF5000,#FF711F);\n    --grad-blue:linear-gradient(135deg,#1F2F5C,#27418B,#4165CB);\n    --font:'Poppins',-apple-system,BlinkMacSystemFont,sans-serif;\n    --type-hero:132px; --type-title:76px; --type-subtitle:40px; --type-lead:34px;\n    --type-body:28px; --type-small:24px; --type-kicker:22px;\n    --pad-x:110px; --pad-y:96px;\n  }\n  .deckwrap section{ font-family:var(--font); -webkit-font-smoothing:antialiased; }\n  /* ---- COVER ---- */\n  .deckwrap .cover{ background:var(--grad-orange); color:#fff; }\n  .deckwrap[data-variant=\"minimal\"] .cover{ background:var(--surface-2); color:var(--ink); }\n  .deckwrap .cover .c-kicker{ color:rgba(255,255,255,.92); }\n  .deckwrap[data-variant=\"minimal\"] .cover .c-kicker{ color:var(--orange); }\n  .deckwrap .cover .c-sub{ color:rgba(255,255,255,.88); }\n  .deckwrap[data-variant=\"minimal\"] .cover .c-sub{ color:var(--muted); }\n  .deckwrap .cover .c-rule{ background:rgba(255,255,255,.4); }\n  .deckwrap[data-variant=\"minimal\"] .cover .c-rule{ background:var(--orange); }\n  .deckwrap .cover .c-foot{ color:rgba(255,255,255,.72); }\n  .deckwrap[data-variant=\"minimal\"] .cover .c-foot{ color:var(--muted); }\n  .deckwrap .cover .c-x{ color:rgba(255,255,255,.55); }\n  .deckwrap[data-variant=\"minimal\"] .cover .c-x{ color:#C7C7CC; }\n  /* ---- DIVIDER ---- */\n  .deckwrap .divider{ background:var(--grad); color:#fff; }\n  .deckwrap[data-variant=\"minimal\"] .divider{ background:var(--surface-2); color:var(--ink); }\n  .deckwrap .divider .dv-num{ color:rgba(255,255,255,.16); }\n  .deckwrap[data-variant=\"minimal\"] .divider .dv-num{ color:var(--acc); opacity:.13; }\n  .deckwrap .divider .dv-kicker{ color:rgba(255,255,255,.85); }\n  .deckwrap[data-variant=\"minimal\"] .divider .dv-kicker{ color:var(--acc); }\n  .deckwrap .divider .dv-sub{ color:rgba(255,255,255,.85); }\n  .deckwrap[data-variant=\"minimal\"] .divider .dv-sub{ color:var(--muted); }\n  .deckwrap .divider .dv-rule{ background:rgba(255,255,255,.35); }\n  .deckwrap[data-variant=\"minimal\"] .divider .dv-rule{ background:var(--acc); }\n  /* ---- CLOSE ---- */\n  .deckwrap .closing{ background:var(--grad-orange); color:#fff; }\n  .deckwrap[data-variant=\"minimal\"] .closing{ background:var(--surface-2); color:var(--ink); }\n  .deckwrap .closing .cl-sub{ color:rgba(255,255,255,.85); }\n  .deckwrap[data-variant=\"minimal\"] .closing .cl-sub{ color:var(--muted); }\n  .deckwrap .closing .cl-x{ color:rgba(255,255,255,.55); }\n  .deckwrap[data-variant=\"minimal\"] .closing .cl-x{ color:#C7C7CC; }\n  @keyframes nfcpulse{ 0%{transform:scale(.85);opacity:.25} 70%{opacity:0} 100%{transform:scale(1.7);opacity:0} }\n\n/* ---- ANIMATIONS ---- */\n@keyframes fadeUp {\n  from { opacity: 0; transform: translateY(28px); }\n  to   { opacity: 1; transform: translateY(0); }\n}\n@keyframes fadeIn {\n  from { opacity: 0; }\n  to   { opacity: 1; }\n}\n\n.deckwrap section h1,\n.deckwrap section h2,\n.deckwrap section p,\n.deckwrap section li,\n.deckwrap section .c-kicker,\n.deckwrap section .dv-kicker,\n.deckwrap section .dv-rule,\n.deckwrap section .c-rule,\n.deckwrap section > div > div > span,\n.deckwrap section .anim-child {\n  opacity: 0;\n}\n\n.deckwrap section.slide-animated h1,\n.deckwrap section.slide-animated h2 {\n  animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) forwards;\n}\n.deckwrap section.slide-animated p {\n  animation: fadeUp 0.65s cubic-bezier(0.22,1,0.36,1) forwards;\n}\n.deckwrap section.slide-animated li {\n  animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) forwards;\n}\n.deckwrap section.slide-animated .c-kicker,\n.deckwrap section.slide-animated .dv-kicker {\n  animation: fadeUp 0.55s cubic-bezier(0.22,1,0.36,1) forwards;\n  animation-delay: 0s !important;\n}\n.deckwrap section.slide-animated .dv-rule,\n.deckwrap section.slide-animated .c-rule {\n  animation: fadeIn 0.5s ease forwards;\n}\n.deckwrap section.slide-animated > div > div > span,\n.deckwrap section.slide-animated .anim-child {\n  animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) forwards;\n}\n\n/* Stagger delays */\n.deckwrap section.slide-animated h1   { animation-delay: 0.08s; }\n.deckwrap section.slide-animated h2   { animation-delay: 0.1s; }\n.deckwrap section.slide-animated p:nth-of-type(1) { animation-delay: 0.14s; }\n.deckwrap section.slide-animated p:nth-of-type(2) { animation-delay: 0.18s; }\n.deckwrap section.slide-animated p:nth-of-type(3) { animation-delay: 0.22s; }\n.deckwrap section.slide-animated li:nth-child(1)  { animation-delay: 0.2s; }\n.deckwrap section.slide-animated li:nth-child(2)  { animation-delay: 0.28s; }\n.deckwrap section.slide-animated li:nth-child(3)  { animation-delay: 0.36s; }\n.deckwrap section.slide-animated li:nth-child(4)  { animation-delay: 0.44s; }\n.deckwrap section.slide-animated li:nth-child(5)  { animation-delay: 0.52s; }\n<\/style>\n<\/helmet>\n<div class=\"deckwrap\" data-variant=\"{{ variant }}\" style=\"width:100vw;height:100vh;background:#000;\">\n<x-import component-from-global-scope=\"deck-stage\" from=\"a4f7d5e4-606d-401a-bef2-4cd781cae0af#/deck-stage.js\" width=\"1920\" height=\"1080\" hint-size=\"100%,100%\"> assive: false });\n\n  // Animations: observe sections becoming visible\n  function animateSection(section) {\n    if (section.classList.contains('slide-animated')) return;\n    section.classList.add('slide-animated');\n  }\n\n  function setupObserver() {\n    var sections = document.querySelectorAll('.deckwrap section');\n    if (!sections.length) { setTimeout(setupObserver, 300); return; }\n\n    var io = new IntersectionObserver(function(entries) {\n      entries.forEach(function(entry) {\n        if (entry.intersectionRatio > 0.7) {\n          // Reset first so re-entering replays animation\n          entry.target.classList.remove('slide-animated');\n          void entry.target.offsetWidth; // force reflow\n          animateSection(entry.target);\n        }\n      });\n    }, { threshold: 0.75 });\n\n    sections.forEach(function(s) { io.observe(s); });\n  }\n\n  // Wait for deck-stage to render\n  if (document.readyState === 'loading') {\n    document.addEventListener('DOMContentLoaded', function() { setTimeout(setupObserver, 400); });\n  } else {\n    setTimeout(setupObserver, 400);\n  }\n})();\n<\/script>\n\n<\/x-import>\n<\/div>\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;variant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;bold&quot;,&quot;options&quot;:[&quot;bold&quot;,&quot;minimal&quot;],&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  renderVals(){\n    return { variant: this.props.variant ?? 'bold' };\n  }\n}\n<\/script>\n\n\n\n<script><\/script>\n\n<script>\n(function() {\n  function playVideos(root) {\n    (root || document).querySelectorAll('video[autoplay]').forEach(function(v) {\n      v.muted = true;\n      v.play().catch(function(){});\n    });\n  }\n  // Watch for videos added to DOM by the bundler\n  var mo = new MutationObserver(function(mutations) {\n    mutations.forEach(function(m) {\n      m.addedNodes.forEach(function(n) {\n        if (n.nodeType === 1) {\n          if (n.tagName === 'VIDEO') { n.muted=true; n.play().catch(function(){}); }\n          else { playVideos(n); }\n        }\n      });\n    });\n  });\n  mo.observe(document.documentElement, { childList: true, subtree: true });\n  // Also try on any user interaction\n  document.addEventListener('keydown', function() { playVideos(); });\n  document.addEventListener('click', function() { playVideos(); });\n  document.addEventListener('wheel', function() { playVideos(); });\n})();\n<\/script>\n<\/body><\/html>"</script>
